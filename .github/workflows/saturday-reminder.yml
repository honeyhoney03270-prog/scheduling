name: Saturday Telegram Reminder

on:
  schedule:
    # 1:00 AM PDT (Saturday) is 8:00 AM UTC on Saturday
    - cron: '0 8 * * 6'
  workflow_dispatch: # Allows manual testing from GitHub Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="📅 Good morning! It's Saturday — open the Schedule Maker and set this week's shifts."
